<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BzMe - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .error { border-color: #ef4444 !important; }
        .error-text { color: #ef4444; font-size: 0.75rem; display: none; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-sm p-8 bg-white rounded-xl shadow-lg">
        <div class="text-center mb-8">
            <span class="text-2xl font-bold">Bz<span class="text-purple-600">Me</span></span>
            <h2 class="text-2xl font-bold mt-4">Buat Akun</h2>
        </div>

        <form id="signupForm" class="space-y-4" novalidate>
            <input type="text" id="fullname" placeholder="Nama Lengkap" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-purple-600 transition">
            
            <div>
                <input type="email" id="email" placeholder="Email" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-purple-600 transition">
                <p id="emailError" class="error-text mt-1">Email tidak valid</p>
            </div>

            <div>
                <input type="password" id="password" placeholder="Kata Sandi" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-purple-600 transition">
                <p id="passError" class="error-text mt-1">Minimal password 8 karakter</p>
            </div>

            <button type="submit" class="w-full py-3 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-lg transition duration-200">
                Daftar
            </button>
        </form>

        <p class="mt-6 text-center text-sm">
            Sudah punya akun? <a href="#" class="text-purple-600 font-semibold">Masuk</a>
        </p>
    </div>

    <script src="signup.js"></script>
</body>
</html>
